<!DOCTYPE html>
<html>
<head>
  <title>Mapa 3D Estoque OSG</title>
  <style>
    body { margin: 0; overflow: hidden; font-family: 'Segoe UI', Arial; background: #f0f0f0; }
    canvas { display: block; }
    
    #menuLateral {
      position: absolute;
      top: 20px;
      left: 20px;
      display: flex;
      flex-direction: column;
      gap: 15px;
      z-index: 10;
    }

    .painel {
      background: rgba(255, 255, 255, 0.95);
      padding: 15px;
      border-radius: 10px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.15);
      border: 1px solid #ddd;
    }

    #info {
      position: absolute;
      bottom: 20px;
      left: 20px;
      background: white;
      padding: 15px;
      border-radius: 10px;
      box-shadow: 0 0 10px rgba(0,0,0,0.2);
      z-index: 10;
      min-width: 200px;
    }

    input { padding: 8px; border: 1px solid #ccc; border-radius: 4px; outline: none; }
    button { 
      padding: 8px 15px; 
      cursor: pointer; 
      background: #002D72; 
      color: white; 
      border: none; 
      border-radius: 4px; 
      font-weight: bold;
      transition: 0.3s;
    }
    button:hover { background: #001a4d; transform: scale(1.05); }

    .excel-label {
      display: block;
      padding: 10px;
      border: 2px dashed #007bff;
      border-radius: 8px;
      color: #007bff;
      cursor: pointer;
      font-size: 13px;
      text-align: center;
    }
  </style>
</head>

<body>

<div id="menuLateral">
  <div class="painel">
    <input id="busca" placeholder="Digite o item (Ex: S0104...)">
    <button id="btnBuscar">Buscar</button>
  </div>

  <div class="painel">
    <label for="input-excel" class="excel-label">
        📂 Atualizar Estoque (Excel)
    </label>
    <input type="file" id="input-excel" accept=".xlsx, .xls" style="display: none;">
  </div>
</div>

<div id="info">Carregando sistema...</div>

<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.160/build/three.module.js"
  }
}
</script>

<script type="module">
import * as THREE from 'three';
import { GLTFLoader } from 'https://cdn.jsdelivr.net/npm/three@0.160/examples/jsm/loaders/GLTFLoader.js';
import { OrbitControls } from 'https://cdn.jsdelivr.net/npm/three@0.160/examples/jsm/controls/OrbitControls.js';

// ================== VARIÁVEIS GLOBAIS & PERSISTÊNCIA ==================
// Tenta carregar do cache do navegador ao abrir
let lotes = JSON.parse(localStorage.getItem('estoque_osg_cache')) || {};
let modelo;
let objetoSelecionado = null;

// ================== LÓGICA DO EXCEL ==================
// ================== LÓGICA DO EXCEL (VERSÃO PARA MOVIMENTAÇÕES) ==================
document.getElementById('input-excel').addEventListener('change', function(e) {
    const reader = new FileReader();
    const file = e.target.files[0];
    if (!file) return;

    document.getElementById("info").innerText = "Processando movimentações...";

    reader.readAsArrayBuffer(file);
    reader.onload = function(e) {
        const data = new Uint8Array(reader.result);
        const workbook = XLSX.read(data, { type: 'array' });
        const worksheet = workbook.Sheets[workbook.SheetNames[0]];
        const rows = XLSX.utils.sheet_to_json(worksheet, { header: 1 });

        let novosLotes = {};
        
        rows.forEach((row, index) => {
            if (index === 0) return; // Pula cabeçalho

            const itemID    = row[0]; // Coluna A
            const ht        = row[1]; // Coluna B
            const bitola    = row[2]; // Coluna C
            const posicao   = row[3]; // Coluna D
            const saldo     = row[7]; // Coluna H (Saldo Atual)

            if (itemID) {
                const idFormatado = itemID.toString().trim();
                
                // Como é um banco de movimentação, o script vai atualizando o objeto.
                // A última linha do Excel para este ID será a que vai prevalecer no App.
                novosLotes[idFormatado] = {
                    pos: posicao ? posicao.toString().trim() : "N/A",
                    produto: "MACHO",
                    qtd: (saldo !== undefined && saldo !== "") ? parseFloat(saldo) : 0,
                    HT: ht ? ht.toString() : "-",
                    BITOLA: bitola ? bitola.toString() : "-"
                };
            }
        });

        // Salva na memória local (cache)
        lotes = novosLotes;
        localStorage.setItem('estoque_osg_cache', JSON.stringify(lotes));

        document.getElementById("info").innerText = "Saldo atualizado: " + Object.keys(lotes).length + " itens únicos.";
        alert("Planilha de movimentações processada com sucesso! Pegamos os saldos mais recentes.");
    };
});

// ================== CENA & CONFIG 3D ==================
const scene = new THREE.Scene();
scene.background = new THREE.Color(0xf0f0f0);
const camera = new THREE.PerspectiveCamera(60, window.innerWidth/window.innerHeight, 0.1, 1000);
camera.position.set(12, 12, 18);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;

scene.add(new THREE.AmbientLight(0xffffff, 0.7));
const dirLight = new THREE.DirectionalLight(0xffffff, 1);
dirLight.position.set(10, 20, 10);
scene.add(dirLight);

const loader = new GLTFLoader();
// ================== CARREGAMENTO DO MODELO ==================
loader.load('estoque.glb', (gltf) => {
    modelo = gltf.scene;
    scene.add(modelo);

    const params = new URLSearchParams(window.location.search);
    const dadoUrl = params.get("pos");
    const loteUrl = params.get("lote");   // Novo
    const bitolaUrl = params.get("bitola"); // Novo

    if (dadoUrl) {
        // Se o Power Apps mandou o lote e bitola direto pela URL
        if (loteUrl) {
            const dadosDiretos = {
                pos: dadoUrl,
                BITOLA: bitolaUrl || "-",
                HT: "-", // Se quiser passar o HT, adicione na URL também
                qtd: "Consulte o App"
            };
            destacar(dadoUrl);
            mostrarInfo(loteUrl, dadosDiretos);
        } 
        // Se não mandou, tenta a lógica antiga do Excel (localStorage)
        else {
            let codigoItem = Object.keys(lotes).find(key => lotes[key].pos === dadoUrl);
            if (codigoItem) {
                destacar(dadoUrl);
                mostrarInfo(codigoItem, lotes[codigoItem]);
            } else {
                destacar(dadoUrl);
                document.getElementById("info").innerHTML = `<b>Local:</b> ${dadoUrl} <br> <i>Bipe o lote no Power Apps para ver detalhes.</i>`;
            }
        }
    }
});

// ================== FUNÇÕES DE BUSCA ==================
function buscarLote() {
    const valor = document.getElementById("busca").value.trim();
    const lote = lotes[valor];
    
    if (lote) {
        destacar(lote.pos);
        mostrarInfo(valor, lote);
    } else {
        alert("Item '" + valor + "' não encontrado nos dados carregados.");
    }
}

document.getElementById('btnBuscar').addEventListener('click', buscarLote);
document.getElementById('busca').addEventListener('keypress', (e) => {
    if (e.key === 'Enter') buscarLote();
});

function mostrarInfo(codigo, lote) {
    document.getElementById("info").innerHTML = `
      <div style="color: #002D72; font-weight: bold; border-bottom: 1px solid #ccc; margin-bottom: 5px;">DETALHES DO ITEM</div>
      <b>Item:</b> ${codigo} <br>
      <b>Bitola:</b> ${lote.BITOLA} <br>
      <b>HT:</b> ${lote.HT} <br>
      <b>Estoque:</b> <span style="color: ${lote.qtd > 0 ? 'green' : 'red'}">${lote.qtd}</span> <br>
      <b>Localização:</b> <mark>${lote.pos}</mark>
    `;
}

function destacar(nome) {
    if (!modelo) return;

    if (objetoSelecionado) {
        objetoSelecionado.traverse((child) => {
            if (child.isMesh && child.material.originalColor) {
                child.material.color.copy(child.material.originalColor);
                child.material.emissive.set(0x000000);
            }
        });
    }

    const obj = modelo.getObjectByName(nome);
    if (!obj) {
        alert("Aviso: Posição " + nome + " não existe no modelo 3D.");
        return;
    }

    objetoSelecionado = obj;
    obj.traverse((child) => {
        if (child.isMesh) {
            if (!child.material.originalColor) {
                child.material = child.material.clone();
                child.material.originalColor = child.material.color.clone();
            }
            child.material.color.set(0xff0000); 
            child.material.emissive = new THREE.Color(0x440000);
        }
    });

    focarObjeto(obj);
}

function focarObjeto(obj) {
    const box = new THREE.Box3().setFromObject(obj);
    const center = box.getCenter(new THREE.Vector3());
    const size = box.getSize(new THREE.Vector3()).length();

    controls.target.copy(center);

    let startPos = camera.position.clone();
    let endPos = new THREE.Vector3(center.x + size, center.y + size, center.z + size);

    let t = 0;
    function animarFoco() {
        if (t < 1) {
            t += 0.03;
            camera.position.lerpVectors(startPos, endPos, t);
            requestAnimationFrame(animarFoco);
        }
    }
    animarFoco();
}

// ================== LOOP ANIMAR ==================
window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
});

function animate() {
    requestAnimationFrame(animate);
    if (objetoSelecionado) {
        objetoSelecionado.traverse((child) => {
            if (child.isMesh) {
                const pulse = Math.sin(Date.now() * 0.005) * 0.3 + 0.7;
                child.material.emissiveIntensity = pulse;
            }
        });
    }
    controls.update();
    renderer.render(scene, camera);
}
animate();
</script>
</body>
</html>
