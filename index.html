<!DOCTYPE html>
<html>
<head>
  <title>Mapa 3D Estoque</title>

  <style>
    body { margin: 0; overflow: hidden; font-family: Arial; }

    canvas { display: block; }

    #buscaBox {
      position: absolute;
      top: 20px;
      left: 20px;
      background: white;
      padding: 15px;
      border-radius: 10px;
      box-shadow: 0 0 10px rgba(0,0,0,0.2);
    }

    #info {
      position: absolute;
      bottom: 20px;
      left: 20px;
      background: white;
      padding: 15px;
      border-radius: 10px;
      box-shadow: 0 0 10px rgba(0,0,0,0.2);
    }

    input {
      padding: 8px;
      margin-right: 5px;
    }

    button {
      padding: 8px;
      cursor: pointer;
    }
  </style>
</head>

<body>

<!-- 🔍 BUSCA -->
<div id="buscaBox">
  <input id="busca" placeholder="Digite o lote">
  <button onclick="buscarLote()">Buscar</button>
</div>

<!-- 📊 INFO -->
<div id="info">
  Nenhum lote selecionado
</div>

<!-- IMPORTMAP -->
<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.160/build/three.module.js"
  }
}
</script>

<script type="module">

import * as THREE from 'three';
import { GLTFLoader } from 'https://cdn.jsdelivr.net/npm/three@0.160/examples/jsm/loaders/GLTFLoader.js';
import { OrbitControls } from 'https://cdn.jsdelivr.net/npm/three@0.160/examples/jsm/controls/OrbitControls.js';

// ================== BANCO (SIMULADO) ==================
const lotes = {
  "123": { pos: "S-105", produto: "Parafuso", qtd: 50 },
  "456": { pos: "S-168", produto: "Porca", qtd: 30 },
  "789": { pos: "C3", produto: "Arruela", qtd: 100 }
};

// ================== CENA ==================
const scene = new THREE.Scene();
scene.background = new THREE.Color(0xf0f0f0);

// ================== CAMERA ==================
const camera = new THREE.PerspectiveCamera(60, window.innerWidth/window.innerHeight, 0.1, 1000);
camera.position.set(8, 8, 12);

// ================== RENDER ==================
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);

// ================== CONTROLES ==================
const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;

// ================== LUZ ==================
scene.add(new THREE.AmbientLight(0xffffff, 0.6));

const dirLight = new THREE.DirectionalLight(0xffffff, 1);
dirLight.position.set(10, 10, 10);
scene.add(dirLight);

// ================== VARIÁVEIS ==================
let modelo;
let objetoSelecionado = null;

// ================== LOADER ==================
const loader = new GLTFLoader();

loader.load('estoque.glb', (gltf) => {
    modelo = gltf.scene;
    scene.add(modelo);

    console.log("Modelo carregado!");

    modelo.traverse((child) => {
        if (child.name) console.log("Objeto:", child.name);
    });

    // URL
    // Procure esse trecho no seu loader e ajuste assim:
const params = new URLSearchParams(window.location.search);
const pos = params.get("pos");

if (pos) {
    console.log("Tentando localizar via URL:", pos);
    // Um pequeno timeout de 500ms garante que o modelo já está renderizado
    setTimeout(() => {
        destacar(pos);
    }, 500);
}
});

// ================== BUSCA ==================
window.buscarLote = function () {
    const valor = document.getElementById("busca").value;
    const lote = lotes[valor];

    if (lote) {
        destacar(lote.pos);
        mostrarInfo(valor, lote);
    } else {
        alert("Lote não encontrado");
    }
};

// ================== INFO ==================
function mostrarInfo(codigo, lote) {
    document.getElementById("info").innerHTML = `
      <b>Lote:</b> ${codigo} <br>
      <b>Produto:</b> ${lote.produto} <br>
      <b>Quantidade:</b> ${lote.qtd} <br>
      <b>Local:</b> ${lote.pos}
    `;
}

// ================== DESTACAR ==================
function destacar(nome) {

    if (!modelo) return;

    if (objetoSelecionado) {
        objetoSelecionado.traverse((child) => {
            if (child.isMesh && child.material.originalColor) {
                child.material.color.copy(child.material.originalColor);
                child.material.emissive.set(0x000000);
            }
        });
    }

    const obj = modelo.getObjectByName(nome);

    if (!obj) {
        console.warn("❌ NÃO ENCONTRADO:", nome);
        return;
    }

    objetoSelecionado = obj;

    obj.traverse((child) => {
        if (child.isMesh) {
            child.material = child.material.clone();
            child.material.originalColor = child.material.color.clone();

            child.material.color.set(0xff0000);
            child.material.emissive = new THREE.Color(0x660000);
        }
    });

    focarObjeto(obj);
}

// ================== FOCO ==================
function focarObjeto(obj) {

    const box = new THREE.Box3().setFromObject(obj);
    const center = box.getCenter(new THREE.Vector3());
    const size = box.getSize(new THREE.Vector3()).length();

    controls.target.copy(center);

    let start = camera.position.clone();
    let end = new THREE.Vector3(center.x + size, center.y + size, center.z + size);

    let t = 0;

    function animar() {
        if (t < 1) {
            t += 0.02;
            camera.position.lerpVectors(start, end, t);
            requestAnimationFrame(animar);
        }
    }

    animar();
}

// ================== CLIQUE ==================
const raycaster = new THREE.Raycaster();
const mouse = new THREE.Vector2();

window.addEventListener('click', (event) => {

    if (!modelo) return;

    mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
    mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;

    raycaster.setFromCamera(mouse, camera);

    const intersects = raycaster.intersectObjects(modelo.children, true);

    if (intersects.length > 0) {
        let obj = intersects[0].object;

        while (obj.parent && obj.parent !== modelo) {
            obj = obj.parent;
        }

        destacar(obj.name);

        document.getElementById("info").innerHTML = `
          <b>Local selecionado:</b> ${obj.name}
        `;
    }
});

// ================== RESPONSIVO ==================
window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
});

// ================== LOOP ==================
function animate() {
    requestAnimationFrame(animate);

    if (objetoSelecionado) {
        objetoSelecionado.traverse((child) => {
            if (child.isMesh) {
                const pulse = Math.sin(Date.now() * 0.005) * 0.3 + 0.7;
                child.material.emissiveIntensity = pulse;
            }
        });
    }

    controls.update();
    renderer.render(scene, camera);
}

// Adicione isso logo após a definição da function destacar(nome)
window.destacar = destacar;

animate();

</script>

</body>
</html>
