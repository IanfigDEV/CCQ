<!DOCTYPE html>
<html>
<head>
  <title>Mapa 3D Estoque OSG</title>
  <style>
    body { margin: 0; overflow: hidden; font-family: 'Segoe UI', Arial; }
    canvas { display: block; }
    #buscaBox {
      position: absolute;
      top: 20px;
      left: 20px;
      background: white;
      padding: 15px;
      border-radius: 10px;
      box-shadow: 0 0 10px rgba(0,0,0,0.2);
      z-index: 10;
    }
    #info {
      position: absolute;
      bottom: 20px;
      left: 20px;
      background: white;
      padding: 15px;
      border-radius: 10px;
      box-shadow: 0 0 10px rgba(0,0,0,0.2);
      z-index: 10;
    }
    input { padding: 8px; margin-right: 5px; border: 1px solid #ccc; border-radius: 4px; }
    button { padding: 8px 15px; cursor: pointer; background: #002D72; color: white; border: none; border-radius: 4px; }
    button:hover { background: #001a4d; }
  </style>
</head>

<body>

<div id="buscaBox">
  <input id="busca" placeholder="Digite o lote">
  <button onclick="buscarLote()">Buscar</button>
</div>

<div id="info">Nenhum lote selecionado</div>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.160/build/three.module.js"
  }
}
</script>

<script type="module">
import * as THREE from 'three';
import { GLTFLoader } from 'https://cdn.jsdelivr.net/npm/three@0.160/examples/jsm/loaders/GLTFLoader.js';
import { OrbitControls } from 'https://cdn.jsdelivr.net/npm/three@0.160/examples/jsm/controls/OrbitControls.js';

// ================== BANCO (SIMULADO) ==================
const lotes = {
  "123": { pos: "S-105", produto: "Parafuso", qtd: 50 },
  "456": { pos: "S-168", produto: "Porca", qtd: 30 },
  "789": { pos: "C3", produto: "Arruela", qtd: 100 }
};

// ================== CENA & CONFIG ==================
const scene = new THREE.Scene();
scene.background = new THREE.Color(0xf0f0f0);
const camera = new THREE.PerspectiveCamera(60, window.innerWidth/window.innerHeight, 0.1, 1000);
camera.position.set(12, 12, 18);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;

scene.add(new THREE.AmbientLight(0xffffff, 0.7));
const dirLight = new THREE.DirectionalLight(0xffffff, 1);
dirLight.position.set(10, 20, 10);
scene.add(dirLight);

let modelo;
let objetoSelecionado = null;
const loader = new GLTFLoader();

// ================== CARREGAMENTO ==================
loader.load('estoque.glb', (gltf) => {
    modelo = gltf.scene;
    scene.add(modelo);
    console.log("Modelo carregado com sucesso!");

    // TRATAMENTO DA URL (PULO DO GATO)
    const params = new URLSearchParams(window.location.search);
    const dadoUrl = params.get("pos");

    if (dadoUrl) {
        console.log("DADO RECEBIDO DA URL:", dadoUrl);
        
        // Tenta traduzir Código -> Posição
        const loteEncontrado = lotes[dadoUrl];
        const posicaoFinal = loteEncontrado ? loteEncontrado.pos : dadoUrl;

        setTimeout(() => {
            destacar(posicaoFinal);
            if (loteEncontrado) {
                mostrarInfo(dadoUrl, loteEncontrado);
            }
        }, 800);
    }
});

// ================== FUNÇÕES GLOBAIS ==================
window.buscarLote = function () {
    const valor = document.getElementById("busca").value;
    const lote = lotes[valor];
    if (lote) {
        destacar(lote.pos);
        mostrarInfo(valor, lote);
    } else {
        alert("Lote não encontrado no banco simulado.");
    }
};

function mostrarInfo(codigo, lote) {
    document.getElementById("info").innerHTML = `
      <b>Lote:</b> ${codigo} <br>
      <b>Produto:</b> ${lote.produto} <br>
      <b>Quantidade:</b> ${lote.qtd} <br>
      <b>Local:</b> ${lote.pos}
    `;
}

function destacar(nome) {
    if (!modelo) return;

    // Resetar destaque anterior
    if (objetoSelecionado) {
        objetoSelecionado.traverse((child) => {
            if (child.isMesh && child.material.originalColor) {
                child.material.color.copy(child.material.originalColor);
                child.material.emissive.set(0x000000);
            }
        });
    }

    const obj = modelo.getObjectByName(nome);
    if (!obj) {
        console.warn("❌ OBJETO NÃO ENCONTRADO NO GLB:", nome);
        return;
    }

    objetoSelecionado = obj;
    obj.traverse((child) => {
        if (child.isMesh) {
            if (!child.material.originalColor) {
                child.material = child.material.clone();
                child.material.originalColor = child.material.color.clone();
            }
            child.material.color.set(0xff0000); // Vermelho destaque
            child.material.emissive = new THREE.Color(0x440000);
        }
    });

    focarObjeto(obj);
}

// Tornar a função destacar disponível globalmente
window.destacar = destacar;

function focarObjeto(obj) {
    const box = new THREE.Box3().setFromObject(obj);
    const center = box.getCenter(new THREE.Vector3());
    const size = box.getSize(new THREE.Vector3()).length();

    controls.target.copy(center);

    let startPos = camera.position.clone();
    let endPos = new THREE.Vector3(center.x + size, center.y + size, center.z + size);

    let t = 0;
    function animarFoco() {
        if (t < 1) {
            t += 0.03;
            camera.position.lerpVectors(startPos, endPos, t);
            requestAnimationFrame(animarFoco);
        }
    }
    animarFoco();
}

// ================== CLIQUE & RESIZE ==================
window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
});

// ================== LOOP ANIMAR ==================
function animate() {
    requestAnimationFrame(animate);
    
    if (objetoSelecionado) {
        objetoSelecionado.traverse((child) => {
            if (child.isMesh) {
                const pulse = Math.sin(Date.now() * 0.005) * 0.3 + 0.7;
                child.material.emissiveIntensity = pulse;
            }
        });
    }
    
    controls.update();
    renderer.render(scene, camera);
}
animate();

</script>
</body>
</html>
